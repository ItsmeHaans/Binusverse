<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/images/SaturBum.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINUSVERSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="splash.css" />
  </head>
  <body class="splash-body">
    <div class="splash-container">

      <!-- Background video -->
      <video autoplay muted loop playsinline id="splash-video">
        <source src="assets/videos/Tamanboy.mp4" type="video/mp4" />
      </video>

      <!-- Main content -->
      <div id="splash-content" class="hidden">
        <div class="welcome-wrapper">
          <h2 class="welcome-text">Welcome to</h2>
        </div>
        <div class="logo-wrapper">
          <h1 class="binusverse-logo-css">BINUSVERSE</h1>
        </div>
        <button id="start-btn">START</button>

        <!-- Auth forms (shown after START) -->
        <div id="auth-panel" style="display:none;margin-top:18px;text-align:center;width:340px;max-width:90vw;">
          <!-- Tab toggle -->
          <div class="auth-tabs-row">
            <button id="tab-login"  class="auth-tab active-tab">LOGIN</button>
            <button id="tab-register" class="auth-tab">REGISTER</button>
          </div>

          <!-- Error msg -->
          <div id="auth-error" style="display:none;font-family:'Press Start 2P',monospace;font-size:0.65rem;color:#ff6b6b;margin-bottom:12px;line-height:1.7;"></div>

          <!-- LOGIN form -->
          <div id="form-login">
            <input id="login-email" type="email" placeholder="Email" class="auth-input" />
            <input id="login-pass"  type="password" placeholder="Password" class="auth-input" style="margin-top:10px;" />
            <button id="login-submit" class="auth-btn">LOGIN ▶</button>
          </div>

          <!-- REGISTER form -->
          <div id="form-register" style="display:none;">
            <input id="reg-name"  type="text"     placeholder="Explorer name" class="auth-input" maxlength="30" />
            <input id="reg-email" type="email"    placeholder="Email" class="auth-input" style="margin-top:10px;" />
            <input id="reg-pass"  type="password" placeholder="Password (min 8)" class="auth-input" style="margin-top:10px;" />
            <button id="reg-submit" class="auth-btn" style="background:#00ff88;box-shadow:0 4px 0 #00a85a;">REGISTER ▶</button>
          </div>
        </div>
      </div>

      <style>
        #auth-panel {
          background: linear-gradient(160deg, rgba(13,15,32,.92), rgba(8,10,24,.92));
          border: 2px solid rgba(0,229,255,.45);
          border-radius: 12px;
          padding: 22px 22px 24px;
          box-shadow: 0 0 28px rgba(0,229,255,.22), inset 0 0 30px rgba(0,229,255,.05);
          backdrop-filter: blur(3px);
        }
        .auth-tabs-row { display:flex; gap:8px; margin-bottom:18px; justify-content:center; }
        .auth-tab {
          font-family:'Press Start 2P',monospace; font-size:0.78rem;
          background:transparent; border:2px solid rgba(0,229,255,.3);
          color:rgba(0,229,255,.55); padding:10px 18px; cursor:pointer;
          border-radius:6px; transition:all .15s; flex:1;
        }
        .auth-tab.active-tab {
          border-color:#00e5ff; color:#00e5ff;
          background:rgba(0,229,255,.08);
          box-shadow:0 0 12px rgba(0,229,255,.3);
        }
        .auth-input {
          font-family:'Pixelify Sans',sans-serif; font-size:1.05rem;
          background:#0d0f20; border:2px solid rgba(0,229,255,.55); color:#e0f7ff;
          padding:12px 14px; width:100%; outline:none; box-sizing:border-box;
          border-radius:6px; transition:border-color .15s, box-shadow .15s;
        }
        .auth-input:focus { border-color:#00e5ff; box-shadow:0 0 12px rgba(0,229,255,.35); }
        .auth-input::placeholder { color:rgba(224,247,255,.35); }
        .auth-btn {
          font-family:'Press Start 2P',monospace; font-size:0.78rem;
          background:#00e5ff; color:#0d0f20; border:none;
          padding:13px 20px; margin-top:14px; cursor:pointer; width:100%;
          border-radius:6px; letter-spacing:1px;
          box-shadow:0 4px 0 #007799; transition:transform .1s, box-shadow .1s;
        }
        .auth-btn:hover { transform:translateY(-2px); box-shadow:0 6px 0 #007799; }
        .auth-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #007799; }
        .auth-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
      </style>
