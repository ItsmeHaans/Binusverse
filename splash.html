<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINUSVERSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="splash.css" />
  </head>
  <body class="splash-body">
    <div class="splash-container">

      <!-- Background video -->
      <video autoplay muted loop playsinline id="splash-video">
        <source src="assets/videos/Tamanboy.mp4" type="video/mp4" />
      </video>

      <!-- Main content -->
      <div id="splash-content" class="hidden">
        <div class="welcome-wrapper">
          <h2 class="welcome-text">Welcome to</h2>
        </div>
        <div class="logo-wrapper">
          <h1 class="binusverse-logo-css">BINUSVERSE</h1>
        </div>
        <button id="start-btn">▶ START</button>
        <div id="name-form" style="display:none;margin-top:16px;text-align:center;">
          <p style="font-family:'Press Start 2P',monospace;font-size:.5rem;color:#fee783;margin-bottom:8px;">Enter your explorer name:</p>
          <input id="name-input" maxlength="20" placeholder="Explorer..."
            style="font-family:'Press Start 2P',monospace;font-size:.5rem;background:#0d0f20;border:2px solid #00e5ff;color:#e0f7ff;padding:8px 12px;width:180px;outline:none;image-rendering:pixelated;" />
          <button id="name-submit"
            style="font-family:'Press Start 2P',monospace;font-size:.5rem;background:#00e5ff;color:#0d0f20;border:none;padding:8px 16px;margin-top:8px;cursor:pointer;display:block;margin:8px auto 0;">
            BEGIN JOURNEY ▶
          </button>
        </div>
      </div>

      <!-- Grass transition at bottom -->
      <div class="grass-divider" aria-hidden="true">
        <img src="assets/images/Group 10.svg" alt="" class="grass-svg" />
      </div>

    </div>

    <script src="user-data.js"></script>
    <script src="splash.js"></script>
  </body>
</html>
