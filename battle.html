<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Battle - BINUSVERSE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="battle.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo-left">
        <a href="index.html"><img src="assets/images/SaturBum.png" /></a>
      </div>
      <ul class="nav-links">
        <li><a href="grimoire.html">Grimoire</a></li>
        <li><a href="battle.html" class="active">Battle</a></li>
        <li><a href="the_commons.html">The Commons</a></li>
      </ul>
    </nav>

    <section class="battle-header">
      <img src="assets/images/battlebg.jpg" class="header-bg" />
      <div class="header-content">
        <h1>Battle Arena</h1>
        <p>Test your knowledge against fellow explorers.</p>
      </div>
    </section>

    <section class="battle-container">
      <!-- ===== PvP MODE ===== -->
      <h2 class="section-title">PvP Mode</h2>
      <div id="pvp-mode" class="pvp-container">
        <!-- Player Card -->
        <a href="grimoire.html" class="player-card">
          <div class="player-card-top">
            <!-- Avatar bulat -->
            <img src="assets/images/profile.jpg" class="avatar" />
            <div class="player-info">
              <h3 class="player-name">Andrew</h3>
              <!-- Tags B88 & SoCS -->
              <div class="player-tags">
                <span class="tag tag-rank">Bronze</span>
                <span class="tag tag-faculty">SoCS</span>
              </div>
              <!-- Badges row: level box + badge icons -->
              <div class="player-badges">
                <div class="level-box">11</div>
                <img src="assets/images/apimembahana.png" class="badge-small" />
              </div>
            </div>
          </div>
        </a>

        <!-- VS Icon -->
        <div class="versus-wrap">
          <!--
            =============================================
            GANTI DI SINI — taruh file vector/SVG/PNG kapak VS kamu
            Export dari teman → simpan sebagai: assets/images/vs-icon.svg atau .png
            Lalu uncomment baris img di bawah:
            =============================================
          -->
          <img
            src="assets/images/axe.svg"
            class="vs-icon"
            onerror="this.style.display = 'none'"
          />
          <!-- fallback kalau file belum ada — hapus div ini kalau sudah ada gambar -->
        </div>

        <!-- Search Card -->
        <div class="search-card">
          <button id="searchBtn">Search Opponent</button>
        </div>
      </div>

      <!-- ===== DAILY MISSION ===== -->
      <h2 class="section-title">Daily Mission</h2>
      <div id="daily-mission" class="daily-quiz">
        <h3>DAILY QUIZ</h3>
        <button id="dailyBtn">Start</button>
      </div>

      <!-- ===== RAID ===== -->
      <h2 class="section-title">Raid</h2>
      <div id="raid" class="raid-container">
        <div class="raid-card easy">Easy</div>
        <div class="raid-card normal">Normal</div>
        <div class="raid-card hard">Hard</div>
      </div>
    </section>

    <script src="battle.js"></script>

    <section class="footer-hero">
      <div class="footer-left">
        <img src="assets/images/BinusverseText.png" alt="Logo" />
      </div>
      <div class="footer-right">
        <p>© 2026 Binusverse. All rights reserved.</p>
      </div>
    </section>
    <script src="assets/js/rank.js"></script>
    <script src="battle.js"></script>
    <script>
      document.getElementById("hamburger").addEventListener("click", () => {
        document.getElementById("navLinks").classList.toggle("active");
      });
      const rankPoints = 120;
      const rank = getRankStyle(rankPoints);
      const tag = document.querySelector(".tag-rank");
      if (tag) {
        tag.textContent = rank.label;
        tag.style.color = rank.color;
        tag.style.borderColor = rank.color;
        tag.style.background = rank.bg;
      }
    </script>
  </body>
</html>
