<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Battle Result — BINUSVERSE</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="battle-result.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="logo-left">
      <a href="index.html"><img src="assets/images/SaturBum.png" alt="Binusverse"/></a>
    </div>
    <ul class="nav-links">
      <li><a href="grimoire.html">Grimoire</a></li>
      <li><a href="battle.html">Battle</a></li>
      <li><a href="the_commons.html">The Commons</a></li>
    </ul>
    <div class="logo-right">
      <img src="assets/images/BinusLogo.png" alt="BINUS"/>
    </div>
  </nav>

  <main class="result-page">
    <canvas id="pixel-bg"></canvas>

    <div class="result-card" id="result-card">
      <!-- Stars animation -->
      <div class="result-stars" id="result-stars"></div>

      <!-- Mode label -->
      <div class="mode-label" id="mode-label">DAILY MISSION</div>

      <!-- Title -->
      <h1 class="result-title" id="result-title">COMPLETED!</h1>

      <!-- Rank badge -->
      <div class="rank-badge" id="rank-badge">★ S RANK</div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val green" id="stat-correct">0</div>
          <div class="stat-lbl">CORRECT</div>
        </div>
        <div class="stat-box">
          <div class="stat-val red" id="stat-wrong">0</div>
          <div class="stat-lbl">WRONG</div>
        </div>
        <div class="stat-box">
          <div class="stat-val cyan" id="stat-xp">+0 XP</div>
          <div class="stat-lbl">EARNED</div>
        </div>
      </div>

      <!-- Level / Rank up banners (hidden by default) -->
      <div class="up-banner" id="level-up-banner" style="display:none">
        <span class="up-icon">▲</span>
        <span id="level-up-text">LEVEL UP!</span>
      </div>
      <div class="up-banner rank-up" id="rank-up-banner" style="display:none">
        <span class="up-icon">✦</span>
        <span id="rank-up-text">RANK UP!</span>
      </div>

      <!-- Item earned (hidden by default) -->
      <div class="item-earned" id="item-earned" style="display:none">
        <div class="item-label">ITEM EARNED</div>
        <div class="item-name" id="item-name">—</div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn-pixel btn-again" id="btn-again">⚔ BATTLE AGAIN</button>
        <button class="btn-pixel btn-home" id="btn-home">⌂ HOME</button>
      </div>
    </div>
  </main>

  <footer class="footer-hero">
    <div class="footer-left">
      <img src="assets/images/BinusverseText.png" alt="Binusverse"/>
    </div>
    <div class="footer-right">
      <p>© 2026 Binusverse. All rights reserved.</p>
    </div>
  </footer>

  <script src="user-data.js"></script>
  <script src="pixel-bg.js"></script>
  <script src="battle-result.js"></script>
</body>
</html>
